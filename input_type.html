<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Type</title>
</head>

<body>
    <form action="">
        Name :-<input type="text" placeholder="Name"><br><br>
        password :-<input type="password" placeholder="password"><br><br>
        phone number:- <input type="number" placeholder="phone"><br><br>

        Gender :----------- <br><br>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        <input type="radio" name="gender">Other
        <br><br>
        Language :--------------- <br><br>
        <input type="checkbox" name="language">English
        <input type="checkbox" name="language"> Hindi
        <input type="checkbox" name="language"> Urdu
        <input type="checkbox" name="language"> Punjabi
        <br><br> 


        



        <button type="submit">Submit</button>
    </form>

</body>

</html>
