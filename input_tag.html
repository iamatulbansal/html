<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>input tag</title>
</head>

<body><form action="">
    Name : <input type="text" placeholder="username" name="username"><br><br>
    Email : <input name="useremail" type="email" placeholder="email"><br><br>
    Time : <input type="time" name="submittime" ><br><br> 
    DOB : <input type="date" name="dob" ><br><br> 
    Date : <input type="datetime-local" name="date" ><br><br> 
    Birth Month : <input type="month" name="month" ><br><br> 
    Week : <input type="week" name="week" ><br><br> 
    Color: <input type="color" name="color" ><br><br> 
    Your Photo: <input type="file" name="photofile" ><br><br> 
    Person: <input type="number" placeholder="0" name="personcount" min="1" max="5"><br><br> 
    Range: <input type="range"  name="range" min="0" max="10"><br><br> 
    Search: <input type="search"  name="rearchfile" placeholder="search"><br><br> 
    Url: <input type="url"  name="websiteurl" placeholder="link"><br><br> 












    <button>Submit</button>
</form>
</body>

</html>
